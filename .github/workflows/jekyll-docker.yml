name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install
      - run: npx cap add android
      - name: Generate silent sound for vibrate-only alarm
        run: |
          mkdir -p android/app/src/main/res/raw
          python3 -c "import wave; w=wave.open('android/app/src/main/res/raw/silence.wav','wb'); w.setnchannels(1); w.setsampwidth(2); w.setframerate(8000); w.writeframes(b'\x00\x00'*8000); w.close()"
      - run: npx cap sync android
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: eyedrop-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
